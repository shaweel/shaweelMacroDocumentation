site_name: shaweelMacro
site_url: https://shaweelmacro.readthedocs.io

theme:
  name: material
  features:
   - navigation.cards
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation:
    - General: installation/index.md
    - GNU+Linux: installation/linux.md
    - Windows: installation/windows.md
